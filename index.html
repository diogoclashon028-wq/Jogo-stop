<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop! Online Supremo</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.25s ease; }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #1c163a 100%); 
            color: #f3f1f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; 
        }

        .container { 
            background: rgba(30, 25, 54, 0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1); 
            width: 100%; max-width: 500px; text-align: center; position: relative; border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-servidor {
            position: absolute; top: 18px; right: 20px; display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 700;
            background: rgba(255, 255, 255, 0.06); padding: 6px 14px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05);
        }
        .bolinha { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .bolinha.conectado { background: #10b981; box-shadow: 0 0 12px #10b981; }

        h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #a78bfa 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }
        h2 { font-size: 1.4rem; font-weight: 700; color: #f3f1f8; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .room-tag {
            background: rgba(167, 139, 250, 0.15); color: #c084fc; padding: 4px 12px; border-radius: 8px;
            font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.5rem; border: 1px dashed rgba(192, 132, 252, 0.4); display: inline-block; margin-top: 5px; letter-spacing: 2px;
        }

        .panel-config { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 15px; margin: 15px 0; text-align: left; }
        .panel-config h4 { color: #a78bfa; font-size: 0.9rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .config-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .config-row label { font-size: 0.85rem; color: rgba(255,255,255,0.7); }
        
        .panel-config input[type="number"], .panel-config select {
            width: 100px; padding: 6px 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-weight: bold; text-align: center; outline: none;
        }
        .panel-config select { width: 140px; text-align-last: center; cursor: pointer; }

        /* Criar Temas */
        .box-criar-tema { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; }
        .box-criar-tema input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 12, 32, 0.6); color: #fff; outline: none; font-size: 0.9rem; margin: 0; }
        .btn-add-tema { width: auto; margin: 0; padding: 0 20px; font-size: 0.9rem; background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); border-radius: 12px; }

        /* Grade Temas */
        .wrapper-categorias { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .item-categoria {
            display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.04); padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem;
        }
        .item-categoria label { display: flex; align-items: center; gap: 8px; width: 100%; cursor: pointer; user-select: none; }
        .item-categoria input[type="checkbox"] { cursor: pointer; accent-color: #a78bfa; width: 16px; height: 16px; }
        .btn-del-tema { background: none; border: none; color: #ef4444; font-size: 1.1rem; cursor: pointer; width: auto; margin: 0; padding: 0 4px; box-shadow: none; }
        .btn-del-tema:hover { transform: scale(1.2); }

        input[type="text"] { 
            width: 100%; padding: 14px 18px; margin: 10px 0; border: 2px solid rgba(255, 255, 255, 0.08); border-radius: 14px; background: rgba(15, 12, 32, 0.5); color: #fff; font-size: 1rem; outline: none;
        }
        input[type="text"]:focus { border-color: #a78bfa; box-shadow: 0 0 15px rgba(167, 139, 250, 0.2); }

        button { width: 100%; padding: 15px; margin: 12px 0; border: none; border-radius: 14px; font-size: 1rem; font-weight: 700; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        button:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); }
        .btn-secondary { background: linear-gradient(135deg, #059669 0%, #047857 100%); }

        .btn-kick { background: #ef4444; color: white; border: none; border-radius: 6px; padding: 4px 10px; font-size: 0.75rem; cursor: pointer; width: auto; margin: 0; font-weight: bold; }
        .divider { margin: 20px 0; color: rgba(255,255,255,0.2); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        .escondido { display: none !important; }

        ul { list-style: none; margin: 15px 0; text-align: left; max-height: 160px; overflow-y: auto; }
        li { background: rgba(255, 255, 255, 0.04); padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.02); }
        .player-info { display: flex; align-items: center; gap: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-servidor">
            <div class="bolinha" id="statusBolinha"></div>
            <span id="statusTexto">CONECTANDO</span>
        </div>

        <div id="telaInicial">
            <h1>Stop! Arena 🎲</h1>
            <input type="text" id="nome" placeholder="Digite seu apelido...">
            <button id="btnCriar" class="btn-primary">CRIAR NOVA SALA</button>
            <div class="divider">ou entre em uma</div>
            <input type="text" id="codigo" placeholder="Código de 4 dígitos">
            <button id="btnEntrar" class="btn-secondary">ENTRAR NA SALA</button>
        </div>

        <div id="telaLobby" class="escondido">
            <h2>Sala Ativa</h2>
            <div id="idSala" class="room-tag">----</div>
            
            <div class="panel-config">
                <h4 id="tituloConfig">Configurações da Partida</h4>
                
                <div class="config-row">
                    <label>Modo de Jogo:</label>
                    <select id="cfgModo">
                        <option value="tempo">Terminar no Tempo</option>
                        <option value="imediato">Acabar no Stop</option>
                    </select>
                </div>
                <div class="config-row">
                    <label>Votação de Palavras:</label>
                    <select id="cfgVotacao">
                        <option value="true">Ativada</option>
                        <option value="false">Desativada</option>
                    </select>
                </div>
                <div class="config-row">
                    <label>Tempo por rodada (s):</label>
                    <input type="number" id="cfgTempo" value="60" min="10" max="300">
                </div>
                <div class="config-row">
                    <label>Total de rodadas:</label>
                    <input type="number" id="cfgRodadas" value="5" min="1" max="20">
                </div>
                <div class="config-row">
                    <label>Pontos palavra normal:</label>
                    <input type="number" id="cfgPtsNormal" value="10" min="1" max="50">
                </div>
                <div class="config-row">
                    <label>Pontos palavra repetida:</label>
                    <input type="number" id="cfgPtsRepetida" value="5" min="0" max="50">
                </div>
                <div class="config-row">
                    <label>Máximo de jogadores:</label>
                    <input type="number" id="cfgLimite" value="8" min="2" max="20">
                </div>
                <div class="config-row">
                    <label>Quantidade de ganhadores:</label>
                    <input type="number" id="cfgVencedores" value="1" min="1" max="10">
                </div>

                <h4 style="margin-top: 15px;" id="subtituloTemas">Gerenciar Palavras</h4>
                <div class="box-criar-tema" id="painelCriarTema">
                    <input type="text" id="inputNovoTema" placeholder="Nome do novo tema...">
                    <button class="btn-primary btn-add-tema" id="btnAddTema">Criar</button>
                </div>
                <div class="wrapper-categorias" id="gradeCategorias"></div>
            </div>

            <div style="border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px;">
                <h3 style="text-align: left; font-size: 0.9rem; color: rgba(255,255,255,0.5); font-weight: 600; margin-bottom: 10px;">JOGADORES NA ARENA</h3>
                <ul id="listaJogadores"></ul>
            </div>

            <button id="btnIniciar" class="btn-primary">INICIAR PARTIDA 🚀</button>
        </div>

        <div id="telaJogo" class="escondido">
            <h2>Letra Sorteada</h2>
            <div id="letraExibida" style="font-size: 5rem; font-weight: 900; color: #a78bfa; margin: 10px 0;">-</div>
            <h4 style="color:#10b981; margin-bottom: 15px;">Ordem das Categorias Sorteada:</h4>
            <ul id="listaOrdemJogo" style="max-height: 150px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px;"></ul>
        </div>
    </div>

    <script>
        const socket = io({ transports: ['polling', 'websocket'] });
        
        let categoriasAtivasLocais = [];

        socket.on('connect', () => { 
            document.getElementById('statusBolinha').classList.add('conectado');
            document.getElementById('statusTexto').innerText = "ONLINE";
        });

        socket.on('disconnect', () => {
            document.getElementById('statusBolinha').classList.remove('conectado');
            document.getElementById('statusTexto').innerText = "DESCONECTADO";
        });

        document.getElementById('btnCriar').addEventListener('click', () => {
            const nome = document.getElementById('nome').value.trim();
            if(!nome) { alert("coloque o seu nome"); return; }
            socket.emit('criarSala', nome);
        });

        document.getElementById('btnEntrar').addEventListener('click', () => {
            const nome = document.getElementById('nome').value.trim();
            const cod = document.getElementById('codigo').value.trim().toUpperCase();
            if(!nome) { alert("coloque o seu nome"); return; }
            if(!cod) { alert("você precisa de um código"); return; }
            socket.emit('joinRoom', { roomCode: cod, name: nome });
        });

        document.getElementById('btnAddTema').addEventListener('click', () => {
            const salaCodigo = document.getElementById('idSala').innerText;
            const input = document.getElementById('inputNovoTema');
            const tema = input.value.trim();
            if (tema && salaCodigo && salaCodigo !== '----') {
                socket.emit('adicionarTema', { roomCode: salaCodigo, novoTema: tema });
                input.value = '';
            }
        });

        socket.on('mensagemExpulso', (msg) => { alert(msg); window.location.reload(); });

        function empacotarESalvarConfig() {
            const salaCodigo = document.getElementById('idSala').innerText;
            if (!salaCodigo || salaCodigo === '----') return;
            
            const novaConfig = {
                modoJogo: document.getElementById('cfgModo').value,
                votacaoAtiva: document.getElementById('cfgVotacao').value === 'true',
                tempo: parseInt(document.getElementById('cfgTempo').value) || 60,
                totalRodadas: parseInt(document.getElementById('cfgRodadas').value) || 5,
                pontosNormal: parseInt(document.getElementById('cfgPtsNormal').value) || 10,
                pontosRepetida: parseInt(document.getElementById('cfgPtsRepetida').value) || 5,
                limiteJogadores: parseInt(document.getElementById('cfgLimite').value) || 8,
                qtdVencedores: parseInt(document.getElementById('cfgVencedores').value) || 1
            };

            socket.emit('salvarConfiguracoes', { roomCode: salaCodigo, novaConfig });
        }

        function alternarCategoria(cat) {
            const salaCodigo = document.getElementById('idSala').innerText;
            if (!salaCodigo || salaCodigo === '----') return;
            
            let novasAtivas = [...categoriasAtivasLocais];
            if (novasAtivas.includes(cat)) {
                novasAtivas = novasAtivas.filter(c => c !== cat);
            } else {
                novasAtivas.push(cat);
            }
            
            socket.emit('atualizarCategoriasAtivas', { roomCode: salaCodigo, categoriasSelecionadas: novasAtivas });
        }

        const inputsConfig = ['cfgTempo', 'cfgRodadas', 'cfgPtsNormal', 'cfgPtsRepetida', 'cfgLimite', 'cfgVencedores', 'cfgModo', 'cfgVotacao'];
        inputsConfig.forEach(id => {
            document.getElementById(id).addEventListener('change', empacotarESalvarConfig);
        });

        document.getElementById('btnIniciar').addEventListener('click', () => {
            const salaCodigo = document.getElementById('idSala').innerText;
            if (salaCodigo && salaCodigo !== '----') {
                socket.emit('startRound', salaCodigo);
            }
        });

        function renderizarGradeCategorias(categoriasTotais, categoriesAtivas) {
            const salaCodigo = document.getElementById('idSala').innerText;
            categoriasAtivasLocais = categoriesAtivas;
            
            const grade = document.getElementById('gradeCategorias');
            grade.innerHTML = '';
            
            categoriasTotais.forEach(cat => {
                const checkado = categoriesAtivas.includes(cat) ? 'checked' : '';
                
                grade.innerHTML += `
                    <div class="item-categoria">
                        <label>
                            <input type="checkbox" id="cb-${cat}" ${checkado} onchange="alternarCategoria('${cat}')">
                            <span>${cat}</span>
                        </label>
                        <button class="btn-del-tema" onclick="socket.emit('deletarTema', {roomCode: '${salaCodigo}', tema: '${cat}'})">🗑️</button>
                    </div>
                `;
            });
        }

        socket.on('atualizarSala', (sala) => {
            document.getElementById('telaInicial').classList.add('escondido');
            document.getElementById('telaLobby').classList.remove('escondido');
            document.getElementById('idSala').innerText = sala.codigo;

            document.getElementById('cfgModo').value = sala.config.modoJogo;
            document.getElementById('cfgVotacao').value = sala.config.votacaoAtiva.toString();
            document.getElementById('cfgTempo').value = sala.config.tempo;
            document.getElementById('cfgRodadas').value = sala.config.totalRodadas;
            document.getElementById('cfgPtsNormal').value = sala.config.pontosNormal;
            document.getElementById('cfgPtsRepetida').value = sala.config.pontosRepetida;
            document.getElementById('cfgLimite').value = sala.config.limiteJogadores;
            document.getElementById('cfgVencedores').value = sala.config.qtdVencedores;

            renderizarGradeCategorias(sala.categoriasDisponiveis, sala.categoriasAtivas);

            const lista = document.getElementById('listaJogadores');
            lista.innerHTML = '';
            sala.jogadores.forEach(p => {
                const ehDono = p.id === sala.donoId;
                const coroa = ehDono ? '👑' : '👤';
                const botaoKick = (!ehDono) ? `<button class="btn-kick" onclick="socket.emit('expulsarJogador', {roomCode: '${sala.codigo}', jogadorId: '${p.id}'})">Expulsar</button>` : '';

                lista.innerHTML += `
                    <li>
                        <div class="player-info">
                            <span>${coroa}</span>
                            <span>${p.nome}</span>
                        </div>
                        ${botaoKick}
                    </li>
                `;
            });
        });

        socket.on('rodadaIniciada', (data) => {
            document.getElementById('telaLobby').classList.add('escondido');
            document.getElementById('telaJogo').classList.remove('escondido');
            document.getElementById('letraExibida').innerText = data.letra;

            const listaOrdem = document.getElementById('listaOrdemJogo');
            listaOrdem.innerHTML = '';
            data.categoriasOrdem.forEach((cat, index) => {
                listaOrdem.innerHTML += `<li style="padding: 6px 12px; margin-bottom: 4px; background: rgba(255,255,255,0.05); font-size: 0.9rem;">${index + 1}° - ${cat}</li>`;
            });
        });

        socket.on('erro', (msg) => alert(msg));
    </script>
</body>
</html>
