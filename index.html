<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop! Online</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: #333; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 500px; text-align: center; }
        .status-bar { background: #ff4757; color: white; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; display: block; }
        .status-bar.connected { background: #2ed573; }
        h1 { color: #6f42c1; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; outline: none; }
        button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, #8e2de2, #4a00e0); }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .btn-danger { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .screen { display: none; }
        .screen.active { display: block; }
        .grid-inputs { text-align: left; margin-top: 15px; }
        .row-vote { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .vote-btns { display: flex; gap: 10px; }
        .vote-btns button { width: auto; padding: 8px 15px; margin: 0; }
    </style>
</head>
<body>

    <div class="card">
        <div id="statusBar" class="status-bar">🔴 Conectando ao servidor...</div>

        <div id="screenLogin" class="screen active">
            <h1>Stop! Online</h1>
            <input type="text" id="inputNome" placeholder="Seu Nome" maxlength="15">
            <button class="btn-primary" onclick="criarSala()">CRIAR NOVA SALA</button>
            <div style="margin: 15px 0; color: #aaa;">-- OU --</div>
            <input type="text" id="inputCodigo" placeholder="CÓDIGO DA SALA">
            <button class="btn-success" onclick="entrarSala()">ENTRAR EM SALA</button>
        </div>

        <div id="screenLobby" class="screen">
            <h2 style="color: #4a00e0;">Lobby da Sala: <span id="labelCodigoSala" style="color:#ff4757;"></span></h2>
            <p style="margin: 10px 0;">Jogadores na sala:</p>
            <ul id="listaJogadores" style="list-style: none; margin-bottom: 20px; font-weight: bold;"></ul>
            
            <div id="painelHost" style="display: none; border-top: 2px dashed #eee; padding-top: 15px;">
                <h3>Configurações do Host</h3>
                <input type="text" id="inputNovaCategoria" placeholder="Nova Categoria">
                <button class="btn-primary" onclick="adicionarCategoria()">+ Adicionar Categoria</button>
                <select id="selectModo" onchange="alterarConfiguracoes()">
                    <option value="classico">Modo Clássico</option>
                    <option value="competitive">Modo Competitivo (Stop Imediato)</option>
                </select>
                <button class="btn-success" style="margin-top: 15px;" onclick="iniciarRodada()">START ROUND</button>
            </div>
            <div id="playerWaitingMsg" style="color: #666; font-style: italic;">Aguardando o host iniciar o jogo...</div>
        </div>

        <div id="screenJogo" class="screen">
            <h2>Letra do Round: <span id="labelLetra" style="font-size: 36px; color: #ff4757;">-</span></h2>
            <div id="containerCategorias" class="grid-inputs"></div>
            <button class="btn-danger" style="margin-top: 20px; font-size: 20px;" onclick="pressionarStop()">STOOOP!</button>
        </div>

        <div id="screenRevisao" class="screen">
            <h2>Votação de Palavras</h2>
            <p style="margin-bottom: 15px; font-style: italic;">Vote se a palavra é válida para a categoria!</p>
            <div id="containerVotacao"></div>
            <div id="painelAvancarHost" style="display: none; margin-top: 20px;">
                <button class="btn-success" onclick="aplicarVotos()">Aplicar Votos e Avançar</button>
            </div>
        </div>

        <div id="screenRanking" class="screen">
            <h2>Pontuação Geral</h2>
            <table style="width: 100%; margin: 20px 0; border-collapse: collapse;">
                <thead>
                    <tr style="background: #eee;">
                        <th style="padding: 10px;">Jogador</th>
                        <th style="padding: 10px;">Pontos</th>
                    </tr>
                </thead>
                <tbody id="tabelaRanking"></tbody>
            </table>
            <div id="painelProximaRodadaHost" style="display: none;">
                <button class="btn-primary" onclick="iniciarRodada()">Próxima Rodada</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let meuId = "";
        let salaAtual = null;

        // Gerenciamento de Telas
        function alternarTela(idTela) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(idTela).classList.add('active');
        }

        // Status de Conexão Física
        socket.on('connect', () => {
            meuId = socket.id;
            const bar = document.getElementById('statusBar');
            bar.innerText = "🟢 Conectado ao Servidor";
            bar.classList.add('connected');
        });

        socket.on('disconnect', () => {
            const bar = document.getElementById('statusBar');
            bar.innerText = "🔴 Conectando ao servidor...";
            bar.classList.remove('connected');
        });

        // Ações do Usuário
        function criarSala() {
            const nome = document.getElementById('inputNome').value.trim();
            if(!nome) return alert("Digite seu nome!");
            socket.emit('criarSala', nome);
        }

        function entrarSala() {
            const nome = document.getElementById('inputNome').value.trim();
            const codigo = document.getElementById('inputCodigo').value.trim().toUpperCase();
            if(!nome || !codigo) return alert("Preencha nome e código da sala!");
            socket.emit('joinRoom', { roomCode: codigo, name: nome });
        }

        function adicionarCategoria() {
            const cat = document.getElementById('inputNovaCategoria').value.trim();
            if(cat) {
                socket.emit('addCategory', cat);
                document.getElementById('inputNovaCategoria').value = "";
            }
        }

        function alterarConfiguracoes() {
            const modo = document.getElementById('selectModo').value;
            socket.emit('updateSettings', { gameMode: modo });
        }

        function iniciarRodada() {
            socket.emit('startRound');
        }

        function pressionarStop() {
            const respostas = {};
            salaAtual.categories.forEach(cat => {
                respostas[cat] = document.getElementById(`input-cat-${cat}`).value.trim();
            });
            socket.emit('pressStop', { respostas, tempoGasto: 0 });
        }

        function enviarVoto(playerTargetId, categoria, voto) {
            socket.emit('votarPalavra', { playerTargetId, categoria, voto });
        }

        function aplicarVotos() {
            socket.emit('aplicarVotosEAvancar');
        }

        // Eventos vindos do Servidor (Socket.io)
        socket.on('salaCriado', (codigo) => {
            document.getElementById('labelCodigoSala').innerText = codigo;
            alternarTela('screenLobby');
        });

        socket.on('roomUpdated', (sala) => {
            salaAtual = sala;
            document.getElementById('labelCodigoSala').innerText = sala.code;
            alternarTela('screenLobby');

            // Atualiza lista de jogadores
            const lista = document.getElementById('listaJogadores');
            lista.innerHTML = sala.players.map(p => `<li>👤 ${p.name} (${p.points} pts) ${p.id === sala.host ? '👑' : ''}</li>`).join('');

            // Mostra controles se for o host
            if(socket.id === sala.host) {
                document.getElementById('painelHost').style.display = 'block';
                document.getElementById('playerWaitingMsg').style.display = 'none';
            } else {
                document.getElementById('painelHost').style.display = 'none';
                document.getElementById('playerWaitingMsg').style.display = 'block';
            }
        });

        socket.on('roundStarted', (data) => {
            document.getElementById('labelLetra').innerText = data.letter;
            const container = document.getElementById('containerCategorias');
            container.innerHTML = data.categories.map(cat => `
                <div style="margin-bottom: 12px;">
                    <label><b>${cat}:</b></label>
                    <input type="text" id="input-cat-${cat}" placeholder="Palavra com ${data.letter}...">
                </div>
            `).join('');
            alternarTela('screenJogo');
        });

        socket.on('abrirRevisao', (data) => {
            alternarTela('screenRevisao');
            document.getElementById('painelAvancarHost').style.display = socket.id === data.hostId ? 'block' : 'none';

            const container = document.getElementById('containerVotacao');
            container.innerHTML = "";

            data.players.forEach(p => {
                if(p.id === socket.id) return; // Não vota em si mesmo
                data.categories.forEach(cat => {
                    const palavra = p.answers[cat] || "Não respondeu";
                    const row = document.createElement('div');
                    row.className = "row-vote";
                    row.innerHTML = `
                        <div style="text-align:left;">
                            <div><b>${p.name}</b> em <i>${cat}</i></div>
                            <div style="font-size:18px; color:#4a00e0; font-weight:bold;">${palavra}</div>
                        </div>
                        <div class="vote-btns">
                            <button class="btn-success" onclick="enviarVoto('${p.id}', '${cat}', 'sim')">👍</button>
                            <button class="btn-danger" onclick="enviarVoto('${p.id}', '${cat}', 'nao')">👎</button>
                        </div>
                    `;
                    container.appendChild(row);
                });
            });
        });

        socket.on('showReviewTable', (data) => {
            alternarTela('screenRanking');
            const tabela = document.getElementById('tabelaRanking');
            tabela.innerHTML = data.ranking.map(p => `
                <tr style="border-bottom: 1px solid #eee;">
                    <td style="padding:10px;">${p.name}</td>
                    <td style="padding:10px; font-weight:bold;">${p.points}</td>
                </tr>
            `).join('');

            if(salaAtual && socket.id === salaAtual.host && !data.isLastRound) {
                document.getElementById('painelProximaRodadaHost').style.display = 'block';
            } else {
                document.getElementById('painelProximaRodadaHost').style.display = 'none';
            }
        });

        socket.on('erro', (msg) => {
            alert(msg);
        });
    </script>
</body>
</html>
