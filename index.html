<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop! Online</title>
    
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            color: #5e35b1;
            margin-bottom: 25px;
            font-size: 2.5rem;
        }

        .status-bar {
            background-color: #ff4d4d;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background-color 0.5s ease;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #764ba2;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            margin-top: 5px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-create {
            background: linear-gradient(135deg, #6a1b9a 0%, #8e24aa 100%);
            margin-bottom: 15px;
        }

        .btn-join {
            background: linear-gradient(135deg, #00bfa5 0%, #00bc8c 100%);
        }

        button:hover {
            filter: brightness(1.1);
        }

        .divisor {
            margin: 15px 0;
            color: #999;
            font-weight: bold;
            position: relative;
        }

        .divisor::before, .divisor::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background-color: #ddd;
        }

        .divisor::before { left: 0; }
        .divisor::after { right: 0; }

        /* Estilos do Painel do Lobby */
        .lobby-panel {
            display: none; /* Escondido por padrão */
            margin-top: 20px;
            text-align: left;
        }

        .room-code-display {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
            border: 2px dashed #764ba2;
        }

        .player-list {
            list-style: none;
            margin: 15px 0;
            padding: 0;
        }

        .player-item {
            background: #f9f9f9;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #00bfa5;
        }

        .host-badge {
            background: #764ba2;
            color: white;
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="statusBar" class="status-bar">
            <span class="status-dot"></span>
            <span id="statusText">Conectando ao servidor...</span>
        </div>

        <div id="telaInicial">
            <h1>Stop! Online</h1>

            <input type="text" id="nomeJogador" placeholder="Seu Nome" maxlength="15">

            <button id="btnCriar" class="btn-create">CRIAR NOVA SALA</button>

            <div class="divisor">-- OU --</div>

            <input type="text" id="codigoSala" placeholder="CÓDIGO DA SALA" maxlength="4" style="text-transform: uppercase;">
            <button id="btnEntrar" class="btn-join">ENTRAR EM SALA</button>
        </div>

        <div id="telaLobby" class="lobby-panel">
            <h2 style="color: #5e35b1; text-align: center; margin-bottom: 15px;">Sala de Espera</h2>
            
            <div class="room-code-display">
                CÓDIGO: <span id="codigoSalaGerado">----</span>
            </div>

            <h3 style="color: #555; margin-bottom: 10px;">Jogadores Conectados:</h3>
            <ul id="listaJogadores" class="player-list">
                </ul>

            <button id="btnIniciarJogo" class="btn-join" style="display: none; margin-top: 20px;">INICIAR JOGO</button>
            <p id="txtAguardandoHost" style="text-align: center; color: #777; font-style: italic; margin-top: 20px;">Aguardando o organizador iniciar a partida...</p>
        </div>
    </div>

    <script>
        const socket = io();

        const statusBar = document.getElementById('statusBar');
        const statusText = document.getElementById('statusText');
        const telaInicial = document.getElementById('telaInicial');
        const telaLobby = document.getElementById('telaLobby');
        
        const btnCriar = document.getElementById('btnCriar');
        const btnEntrar = document.getElementById('btnEntrar');
        const nomeJogador = document.getElementById('nomeJogador');
        const codigoSala = document.getElementById('codigoSala');
        
        const codigoSalaGerado = document.getElementById('codigoSalaGerado');
        const listaJogadores = document.getElementById('listaJogadores');
        const btnIniciarJogo = document.getElementById('btnIniciarJogo');
        const txtAguardandoHost = document.getElementById('txtAguardandoHost');

        socket.on('connect', () => {
            statusBar.style.backgroundColor = '#2ecc71';
            statusText.innerText = 'Conectado ao Servidor';
        });

        socket.on('disconnect', () => {
            statusBar.style.backgroundColor = '#ff4d4d';
            statusText.innerText = 'Conectando ao servidor...';
        });

        // Clique em Criar Sala
        btnCriar.addEventListener('click', () => {
            const nome = nomeJogador.value.trim();
            if (!nome) {
                alert('Por favor, digite o seu nome para jogar!');
                return;
            }
            socket.emit('criarSala', nome);
        });

        // Clique em Entrar na Sala
        btnEntrar.addEventListener('click', () => {
            const nome = nomeJogador.value.trim();
            const codigo = codigoSala.value.trim().toUpperCase();

            if (!nome) {
                alert('Por favor, digite o seu nome para jogar!');
                return;
            }
            if (codigo.length !== 4) {
                alert('O código da sala deve conter exatamente 4 letras!');
                return;
            }

            socket.emit('joinRoom', { roomCode: codigo, name: nome });
        });

        // Evento disparado pelo Host para iniciar o jogo
        btnIniciarJogo.addEventListener('click', () => {
            socket.emit('startRound');
        });

        // Quando a sala é criada, troca as telas e exibe o código
        socket.on('salaCriado', (codigoGerado) => {
            telaInicial.style.display = 'none';
            telaLobby.style.display = 'block';
            codigoSalaGerado.innerText = codigoGerado;
        });

        // Atualização em tempo real dos jogadores na sala
        socket.on('roomUpdated', (sala) => {
            // Se o jogador entrou por código, muda a tela dele também
            if (telaInicial.style.display !== 'none') {
                telaInicial.style.display = 'none';
                telaLobby.style.display = 'block';
                codigoSalaGerado.innerText = sala.code;
            }

            // Limpa a lista atual
            listaJogadores.innerHTML = '';

            // Preenche com os novos dados recebidos do servidor
            sala.players.forEach(p => {
                const li = document.createElement('li');
                li.className = 'player-item';
                
                let isHost = p.id === sala.host;
                li.innerHTML = `
                    <span>${p.name}</span>
                    ${isHost ? '<span class="host-badge">Dono</span>' : ''}
                `;
                listaJogadores.appendChild(li);
            });

            // Mostra o botão de iniciar apenas para o Dono da Sala (Host)
            if (socket.id === sala.host) {
                btnIniciarJogo.style.display = 'block';
                txtAguardandoHost.style.display = 'none';
            } else {
                btnIniciarJogo.style.display = 'none';
                txtAguardandoHost.style.display = 'block';
            }
        });

        socket.on('erro', (mensagem) => {
            alert(mensagem);
        });
    </script>

</body>
</html>
