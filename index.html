<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop! Online</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box;
        }
        .container { 
            background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); width: 100%; max-width: 550px; box-sizing: border-box; 
        }
        #status-conexao {
            text-align: center; padding: 10px; background: #ff4b2b; color: white; font-weight: bold; border-radius: 8px; margin-bottom: 15px; font-size: 14px;
        }
        h2 { color: #4a148c; text-align: center; margin-top: 0; font-size: 28px; }
        h3 { color: #7b1fa2; border-bottom: 2px solid #e1bee7; padding-bottom: 5px; margin-top: 20px; }
        input[type="text"] { 
            width: 100%; padding: 12px; margin: 6px 0 12px 0; box-sizing: border-box; border-radius: 8px; border: 2px solid #ccc; font-size: 16px; 
        }
        button { 
            width: 100%; padding: 14px; margin: 8px 0; box-sizing: border-box; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; text-transform: uppercase; transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: white; }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .screen { display: none; }
        .screen.active { display: block; }
        .banner-img { width: 100%; max-height: 130px; object-fit: cover; border-radius: 12px; margin-bottom: 20px; }
        .player-item { display: flex; justify-content: space-between; align-items: center; background: #f3e5f5; padding: 12px; margin: 8px 0; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div id="status-conexao">🔴 Conectando ao servidor backend...</div>

    <div id="screen-login" class="screen active">
        <img class="banner-img" src="https://images.unsplash.com/photo-1578328819058-b69f3a3b0f6b?w=600&auto=format&fit=crop&q=60">
        <h2>Stop! Online</h2>
        <input type="text" id="username" placeholder="Seu Nome">
        <button class="btn-primary" onclick="createRoom()">Criar Nova Sala</button>
        <hr style="border: 0; height: 1px; background: #ddd; margin: 15px 0;">
        <input type="text" id="room-code-input" placeholder="Código da Sala">
        <button class="btn-success" onclick="joinRoom()">Entrar em Sala</button>
    </div>

    <div id="screen-lobby" class="screen">
        <h2 id="lobby-title">Sala: ----</h2>
        <h3>Jogadores na Sala</h3>
        <div id="player-list"></div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    // Aponta direto para o seu link do Render de produção
    const socket = io("https://jogo-stop.onrender.com");
    let myId = null;

    socket.on('connect', () => { 
        myId = socket.id; 
        const indicador = document.getElementById('status-conexao');
        indicador.innerText = "🟢 Conectado ao Servidor!";
        indicador.style.background = "#11998e";
    });

    socket.on('disconnect', () => { 
        const indicador = document.getElementById('status-conexao');
        indicador.innerText = "🔴 Conexão perdida.";
        indicador.style.background = "#ff4b2b";
    });

    socket.on('connect_error', (error) => {
        const indicador = document.getElementById('status-conexao');
        indicador.innerText = "🔴 Erro: " + error.message;
    });

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function createRoom() {
        const name = document.getElementById('username').value.trim();
        if(!name) return alert('Digite seu nome!');
        socket.emit('criarSala', name);
    }

    function joinRoom() {
        const name = document.getElementById('username').value.trim();
        const roomCode = document.getElementById('room-code-input').value.trim();
        if(!name || !roomCode) return alert('Preencha nome e código!');
        socket.emit('joinRoom', { roomCode, name });
    }

    socket.on('salaCriada', (codigoSala) => { 
        showScreen('screen-lobby'); 
    });

    socket.on('roomUpdated', (room) => {
        document.getElementById('lobby-title').innerText = 'Sala: ' + room.code;
        const playerList = document.getElementById('player-list');
        playerList.innerHTML = '';
        room.players.forEach(p => {
            const div = document.createElement('div');
            div.className = 'player-item';
            div.innerText = p.name + (p.id === room.host ? ' 👑' : '');
            playerList.appendChild(div);
        });
    });

    socket.on('erro', (msg) => { alert(msg); });
</script>
</body>
</html>
