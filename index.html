<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop! Online Supremo</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.25s ease; }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #1c163a 100%); 
            color: #f3f1f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; 
            position: relative;
            overflow-x: hidden;
        }

        /* SISTEMA DE NOTIFICAÇÕES (TOASTS) NO TOPO */
        #container-notificacoes {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(30, 25, 54, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #f3f1f8;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: translateY(-20px);
            animation: deslizarEntrada 0.3s forwards;
            pointer-events: auto;
        }

        .toast.erro {
            border-color: rgba(239, 68, 68, 0.4);
            background: linear-gradient(135deg, rgba(40, 15, 30, 0.95), rgba(20, 10, 20, 0.95));
            color: #fca5a5;
        }

        .toast.sucesso {
            border-color: rgba(16, 185, 129, 0.4);
            background: linear-gradient(135deg, rgba(15, 40, 30, 0.95), rgba(10, 20, 15, 0.95));
            color: #a7f3d0;
        }

        .toast.info {
            border-color: rgba(167, 139, 250, 0.4);
            background: linear-gradient(135deg, rgba(25, 20, 50, 0.95), rgba(15, 12, 32, 0.95));
            color: #c084fc;
        }

        @keyframes deslizarEntrada {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes deslizarSaida {
            to { opacity: 0; transform: translateY(-20px); }
        }

        /* RESTANTE DOS ESTILOS ORIGINAIS MANTIDOS */
        .container { 
            background: rgba(30, 25, 54, 0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1); 
            width: 100%; max-width: 500px; text-align: center; position: relative; border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-servidor {
            position: absolute; top: 18px; right: 20px; display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 700;
            background: rgba(255, 255, 255, 0.06); padding: 6px 14px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }
        .bolinha { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
        .bolinha.conectado { background: #10b981; box-shadow: 0 0 12px #10b981; }

        h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #a78bfa 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }
        h2 { font-size: 1.4rem; font-weight: 700; color: #f3f1f8; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .room-tag {
            background: rgba(167, 139, 250, 0.15); color: #c084fc; padding: 4px 12px; border-radius: 8px;
            font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.5rem; border: 1px dashed rgba(192, 132, 252, 0.4); display: inline-block; margin-top: 5px; letter-spacing: 2px;
        }

        .panel-config { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 15px; margin: 15px 0; text-align: left; }
        .config-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.85rem; }
        
        .panel-config input[type="number"], .panel-config select {
            width: 100px; padding: 6px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; text-align: center; outline: none;
        }
        .panel-config select { width: 140px; }
        .panel-config input:disabled, .panel-config select:disabled { opacity: 0.5; cursor: not-allowed; }

        .box-criar-tema { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; }
        .box-criar-tema input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 12, 32, 0.6); color: #fff; outline: none; }
        .btn-add-tema { width: auto; padding: 0 20px; background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); border-radius: 12px; }

        .wrapper-categorias { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .item-categoria {
            display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.04); padding: 10px; border-radius: 10px; font-size: 0.85rem;
        }
        .btn-del-tema { background: none; border: none; color: #ef4444; font-size: 1.1rem; cursor: pointer; width: auto; }

        input[type="text"] { 
            width: 100%; padding: 14px; margin: 10px 0; border: 2px solid rgba(255, 255, 255, 0.08); border-radius: 14px; background: rgba(15, 12, 32, 0.5); color: #fff; outline: none;
        }

        button { width: 100%; padding: 15px; margin: 12px 0; border: none; border-radius: 14px; font-size: 1rem; font-weight: 700; color: white; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); }
        .btn-secondary { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
        .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); font-size: 1.5rem; margin-top: 20px; }

        .btn-kick { background: #ef4444; color: white; border-radius: 6px; padding: 4px 10px; font-size: 0.75rem; width: auto; font-weight: bold; }
        .divider { margin: 20px 0; color: rgba(255,255,255,0.2); font-size: 0.85rem; text-transform: uppercase; }
        .escondido { display: none !important; }

        ul { list-style: none; margin: 15px 0; text-align: left; max-height: 160px; overflow-y: auto; }
        li { background: rgba(255, 255, 255, 0.04); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }

        .game-header { display: flex; justify-content: space-between; align-items: center; width: 100%; border-bottom: 2px dashed rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 25px; }
        .letra-destaque, .tempo-destaque { font-size: 3.5rem; font-weight: 900; color: #a78bfa; }
        .tempo-destaque.perigo { color: #ef4444; text-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        
        .formulario-jogo { width: 100%; max-height: 45vh; overflow-y: auto; text-align: left; }
        .row-campo-jogo { background: rgba(0, 0, 0, 0.15); padding: 12px; border-radius: 14px; margin-bottom: 12px; }
        .row-campo-jogo label { display: block; font-size: 0.85rem; font-weight: bold; color: #c084fc; margin-bottom: 6px; text-transform: uppercase; }
        .input-jogo { width: 100%; padding: 12px; background: rgba(15, 12, 32, 0.4); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #fff; outline: none; }
        
        .card-votacao { background: rgba(255,255,255,0.04); padding: 15px; border-radius: 14px; margin-bottom: 15px; text-align: left; }
        .votos-botoes { display: flex; gap: 10px; margin-top: 10px; }
        .btn-voto { padding: 8px; font-size: 0.85rem; border-radius: 8px; width: 50%; }
        .btn-valido { background: #10b981; }
        .btn-invalido { background: #ef4444; }
        .btn-voto.selecionado { outline: 2px solid #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="container-notificacoes"></div>

    <div class="container">
        <div class="status-servidor">
            <div class="bolinha" id="statusBolinha"></div>
            <span id="statusTexto">CONECTANDO</span>
        </div>

        <div id="telaInicial">
            <h1>Stop! Arena 🎲</h1>
            <input type="text" id="nome" placeholder="Digite seu apelido...">
            <button id="btnCriar" class="btn-primary">CRIAR NOVA SALA</button>
            <div class="divider">ou entre em uma</div>
            <input type="text" id="codigo" placeholder="Código de 4 dígitos">
            <button id="btnEntrar" class="btn-secondary">ENTRAR NA SALA</button>
        </div>

        <div id="telaLobby" class="escondido">
            <h2>Sala Ativa</h2>
            <div id="idSala" class="room-tag">----</div>
            
            <div class="panel-config">
                <h4 id="tituloConfig">Configurações</h4>
                <div class="config-row"><label>Modo:</label><select id="cfgModo"><option value="tempo">Tempo</option><option value="imediato">Stop</option></select></div>
                <div class="config-row"><label>Votação:</label><select id="cfgVotacao"><option value="true">Ativa</option><option value="false">Desativada</option></select></div>
                <div class="config-row"><label>Tempo (s):</label><input type="number" id="cfgTempo" value="60"></div>
                <div class="config-row"><label>Rodadas:</label><input type="number" id="cfgRodadas" value="5"></div>
                <div class="config-row"><label>Pts Normal:</label><input type="number" id="cfgPtsNormal" value="10"></div>
                <div class="config-row"><label>Pts Repetida:</label><input type="number" id="cfgPtsRepetida" value="5"></div>
                <div class="config-row"><label>Max Jogadores:</label><input type="number" id="cfgLimite" value="8"></div>
                <div class="config-row"><label>Vencedores:</label><input type="number" id="cfgVencedores" value="1"></div>

                <div class="box-criar-tema" id="painelCriarTema" style="margin-top:15px;">
                    <input type="text" id="inputNovoTema" placeholder="Novo tema...">
                    <button class="btn-primary btn-add-tema" id="btnAddTema">Criar</button>
                </div>
                <div class="wrapper-categorias" id="gradeCategorias"></div>
            </div>

            <ul id="listaJogadores"></ul>
            <button id="btnIniciar" class="btn-primary escondido">INICIAR PARTIDA 🚀</button>
        </div>

        <div id="telaJogo" class="escondido" style="width: 100%;">
            <div class="game-header">
                <div><span>Letra</span><div id="letraExibida" class="letra-destaque">-</div></div>
                <div><span>Tempo</span><div id="tempoRestante" class="tempo-destaque">60</div></div>
            </div>
            <div id="formularioJogo" class="formulario-jogo"></div>
            <button id="btnStop" class="btn-danger">🛑 BATER STOP! 🛑</button>
        </div>

        <div id="telaVotacao" class="escondido" style="width: 100%;">
            <h2>Avaliação de Palavras</h2>
            <p style="margin-bottom: 15px; color:#a78bfa;">Letra ativa: <b id="letraVotacao"></b></p>
            <div id="containerVotacao" class="formulario-jogo"></div>
            <button id="btnEnviarVotos" class="btn-secondary">CONCLUIR AVALIAÇÃO ✓</button>
        </div>

        <div id="telaResultados" class="escondido" style="width: 100%;">
            <h2>Placar da Rodada</h2>
            <div id="containerResultados" class="panel-config"></div>
            <button id="btnProxima" class="btn-primary escondido">AVANÇAR RODADA ➔</button>
            <p id="msgAguardandoDono" style="font-size:0.9rem; color:rgba(255,255,255,0.5);" class="escondido">Aguardando o líder iniciar a próxima rodada...</p>
        </div>
    </div>

    <script>
        const socket = io();
        let minhaSalaAtual = null;
        let timerInterval;
        let votosLocais = {};

        // MOTOR DE NOTIFICAÇÕES TOAST EMBUTIDO NO TOPO (SUBSTITUTO DOS ALERTS)
        function mostrarNotificacao(mensagem, tipo = 'info') {
            const container = document.getElementById('container-notificacoes');
            const toast = document.createElement('div');
            toast.className = `toast ${tipo}`;
            toast.innerText = mensagem;

            container.appendChild(toast);

            // Inicia o sumiço automático após 4 segundos
            setTimeout(() => {
                toast.style.animation = 'deslizarSaida 0.3s forwards';
                toast.addEventListener('animationend', () => {
                    toast.remove();
                });
            }, 4000);
        }

        function verifConexao(c) {
            document.getElementById('statusBolinha').className = c ? 'bolinha conectado' : 'bolinha';
            document.getElementById('statusTexto').innerText = c ? 'ONLINE' : 'CONECTANDO';
        }
        socket.on('connect', () => verifConexao(true));
        socket.on('disconnect', () => verifConexao(false));

        document.getElementById('btnCriar').addEventListener('click', () => {
            const n = document.getElementById('nome').value.trim();
            if(!n) return mostrarNotificacao("Por favor, digite seu nome!", "erro");
            socket.emit('criarSala', n);
        });

        document.getElementById('btnEntrar').addEventListener('click', () => {
            const n = document.getElementById('nome').value.trim();
            const c = document.getElementById('codigo').value.trim().toUpperCase();
            if(!n || !c) return mostrarNotificacao("Preencha o seu nome e o código de acesso!", "erro");
            socket.emit('joinRoom', { roomCode: c, name: n });
        });

        document.getElementById('btnAddTema').addEventListener('click', () => {
            if (!minhaSalaAtual || minhaSalaAtual.donoId !== socket.id) return;
            const input = document.getElementById('inputNovoTema');
            const tema = input.value.trim();
            if (tema) {
                socket.emit('adicionarTema', { roomCode: minhaSalaAtual.codigo, novoTema: tema });
                input.value = '';
            }
        });

        function empacotarESalvarConfig() {
            if (!minhaSalaAtual || minhaSalaAtual.donoId !== socket.id) return;
            const novaConfig = {
                modoJogo: document.getElementById('cfgModo').value,
                votacaoAtiva: document.getElementById('cfgVotacao').value === 'true',
                tempo: parseInt(document.getElementById('cfgTempo').value) || 60,
                totalRodadas: parseInt(document.getElementById('cfgRodadas').value) || 5,
                pontosNormal: parseInt(document.getElementById('cfgPtsNormal').value) || 10,
                pontosRepetida: parseInt(document.getElementById('cfgPtsRepetida').value) || 5,
                limiteJogadores: parseInt(document.getElementById('cfgLimite').value) || 8,
                qtdVencedores: parseInt(document.getElementById('cfgVencedores').value) || 1
            };
            socket.emit('salvarConfiguracoes', { roomCode: minhaSalaAtual.codigo, novaConfig });
        }

        const inputsConfig = ['cfgTempo', 'cfgRodadas', 'cfgPtsNormal', 'cfgPtsRepetida', 'cfgLimite', 'cfgVencedores', 'cfgModo', 'cfgVotacao'];
        inputsConfig.forEach(id => document.getElementById(id).addEventListener('change', empacotarESalvarConfig));

        document.getElementById('btnIniciar').addEventListener('click', () => {
            if(minhaSalaAtual) socket.emit('startRound', minhaSalaAtual.codigo);
        });

        document.getElementById('btnProxima').addEventListener('click', () => {
            if(minhaSalaAtual) socket.emit('startRound', minhaSalaAtual.codigo);
        });

        socket.on('atualizarSala', (sala) => {
            minhaSalaAtual = sala;
            const souDono = (socket.id === sala.donoId);

            if(sala.status === 'lobby') {
                document.getElementById('telaInicial').className = 'escondido';
                document.getElementById('telaJogo').className = 'escondido';
                document.getElementById('telaVotacao').className = 'escondido';
                document.getElementById('telaResultados').className = 'escondido';
                document.getElementById('telaLobby').className = '';
                document.getElementById('idSala').innerText = sala.codigo;

                document.getElementById('cfgModo').value = sala.config.modoJogo;
                document.getElementById('cfgVotacao').value = sala.config.votacaoAtiva.toString();
                document.getElementById('cfgTempo').value = sala.config.tempo;
                document.getElementById('cfgRodadas').value = sala.config.totalRodadas;
                document.getElementById('cfgPtsNormal').value = sala.config.pontosNormal;
                document.getElementById('cfgPtsRepetida').value = sala.config.pontosRepetida;
                document.getElementById('cfgLimite').value = sala.config.limiteJogadores;
                document.getElementById('cfgVencedores').value = sala.config.qtdVencedores;

                const painelTema = document.getElementById('painelCriarTema');
                const btnIniciar = document.getElementById('btnIniciar');

                if(souDono) {
                    document.getElementById('tituloConfig').innerText = "Configurações (Dono)";
                    painelTema.className = "box-criar-tema";
                    btnIniciar.className = 'btn-primary';
                    inputsConfig.forEach(id => document.getElementById(id).disabled = false);
                } else {
                    document.getElementById('tituloConfig').innerText = "Configurações (Visualização)";
                    painelTema.className = "escondido";
                    btnIniciar.className = 'escondido';
                    inputsConfig.forEach(id => document.getElementById(id).disabled = true);
                }
                
                const lista = document.getElementById('listaJogadores');
                lista.innerHTML = '';
                sala.jogadores.forEach(p => {
                    const esDono = (sala.donoId === p.id);
                    const botaoKick = (souDono && !esDono) ? `<button class="btn-kick" onclick="socket.emit('expulsarJogador', {roomCode: '${sala.codigo}', jogadorId: '${p.id}'})">Kick</button>` : '';
                    lista.innerHTML += `<li><span>${esDono?'👑 ':''}${p.nome}</span><div><b style="margin-right:10px;">${p.pontos} Pts</b>${botaoKick}</div></li>`;
                });

                const grade = document.getElementById('gradeCategorias');
                grade.innerHTML = '';
                sala.categoriasDisponiveis.forEach(cat => {
                    const check = sala.categoriasAtivas.includes(cat) ? 'checked' : '';
                    const botaoLixeira = souDono ? `<button class="btn-del-tema" onclick="socket.emit('deletarTema', {roomCode: '${minhaSalaAtual.codigo}', tema: '${cat}'})">🗑️</button>` : '';
                    grade.innerHTML += `
                        <div class="item-categoria">
                            <label><input type="checkbox" ${check} ${souDono?'':'disabled'} onchange="alte
