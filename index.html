<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Base</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #764ba2; color: white; text-align: center; padding: 20px; }
        .box { background: white; color: #333; padding: 20px; border-radius: 10px; max-width: 400px; margin: 20px auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #00bfa5; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .escondido { display: none; }
    </style>
</head>
<body>

    <h1>Stop! Online 🎲</h1>

    <div id="telaInicial" class="box">
        <input type="text" id="nome" placeholder="Seu Nome">
        <button id="btnCriar">Criar Sala</button>
        <p>or</p>
        <input type="text" id="codigo" placeholder="Código da Sala">
        <button id="btnEntrar">Entrar</button>
    </div>

    <div id="telaLobby" class="box escondido">
        <h2>Sala: <span id="idSala">----</span></h2>
        <h3>Jogadores:</h3>
        <ul id="lista" style="text-align: left;"></ul>
        <button id="btnIniciar">Começar Jogo</button>
    </div>

    <div id="telaJogo" class="box escondido">
        <h2>Letra: <span id="letra" style="color: red; font-size: 2rem;">-</span></h2>
        <input type="text" id="respNome" placeholder="Nome...">
        <input type="text" id="respAnimal" placeholder="Animal...">
        <input type="text" id="respObjeto" placeholder="Objeto...">
        <br><br>
        <button id="btnStop" style="background: red;">STOP! 🛑</button>
    </div>

    <div id="telaResultado" class="box escondido">
        <h2>Respostas enviadas:</h2>
        <div id="resultadosCorpo" style="text-align: left;"></div>
        <br>
        <button onclick="window.location.reload()">Jogar Novamente</button>
    </div>

    <script>
        const socket = io();
        let minhaSala = '';

        // Cliques dos botões
        document.getElementById('btnCriar').addEventListener('click', () => {
            const nome = document.getElementById('nome').value;
            if(nome) socket.emit('criarSala', nome);
        });

        document.getElementById('btnEntrar').addEventListener('click', () => {
            const nome = document.getElementById('nome').value;
            const cod = document.getElementById('codigo').value;
            if(nome && cod) {
                minhaSala = cod.toUpperCase();
                socket.emit('joinRoom', { roomCode: minhaSala, name: nome });
            }
        });

        document.getElementById('btnIniciar').addEventListener('click', () => {
            socket.emit('startRound', minhaSala);
        });

        document.getElementById('btnStop').addEventListener('click', () => {
            const respostas = {
                Nome: document.getElementById('respNome').value,
                Animal: document.getElementById('respAnimal').value,
                Objeto: document.getElementById('respObjeto').value
            };
            socket.emit('pressStop', { roomCode: minhaSala, respostas: respostas });
        });

        // Respostas do Servidor
        socket.on('salaCriada', (codigo) => {
            minhaSala = codigo;
        });

        socket.on('atualizarSala', (sala) => {
            document.getElementById('telaInicial').classList.add('escondido');
            document.getElementById('telaLobby').classList.remove('escondido');
            document.getElementById('idSala').innerText = sala.codigo;

            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            sala.jogadores.forEach(p => {
                lista.innerHTML += `<li>👤 ${p.nome}</li>`;
            });
        });

        socket.on('rodadaIniciada', (letra) => {
            document.getElementById('telaLobby').classList.add('escondido');
            document.getElementById('telaJogo').classList.remove('escondido');
            document.getElementById('letra').innerText = letra;
        });

        socket.on('jogoParado', (respostasDoServidor) => {
            document.getElementById('telaJogo').classList.add('escondido');
            document.getElementById('telaResultado').classList.remove('escondido');
            
            const div = document.getElementById('resultadosCorpo');
            div.innerHTML = '';
            
            Object.keys(respostasDoServidor).forEach(id => {
                const resp = respostasDoServidor[id];
                div.innerHTML += `
                    <p><strong>Jogador (${id.substring(0,4)}):</strong></p>
                    <ul>
                        <li>Nome: ${resp.Nome || '-'}</li>
                        <li>Animal: ${resp.Animal || '-'}</li>
                        <li>Objeto: ${resp.Objeto || '-'}</li>
                    </ul><hr>
                `;
            });
        });

        socket.on('erro', (msg) => alert(msg));
    </script>
</body>
</html>
