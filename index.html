<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop! Online Avançado</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box;}
        .container { background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); width: 100%; max-width: 550px; box-sizing: border-box; }
        #status-conexao { text-align: center; padding: 10px; background: #ff4b2b; color: white; font-weight: bold; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        h2 { color: #4a148c; text-align: center; margin-top: 0; }
        h3 { color: #7b1fa2; border-bottom: 2px solid #e1bee7; padding-bottom: 5px; margin-top: 20px; }
        label { font-weight: bold; color: #4a148c; display: block; margin-top: 10px; font-size: 14px;}
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; margin: 6px 0 12px 0; box-sizing: border-box; border-radius: 8px; border: 2px solid #ccc; font-size: 16px; }
        input[disabled] { background-color: #e0e0e0; color: #757575; cursor: not-allowed; }
        button { width: 100%; padding: 14px; margin: 8px 0; box-sizing: border-box; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; text-transform: uppercase; }
        .btn-primary { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: white; }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .btn-stop { background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%); color: white; font-size: 20px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .player-item { display: flex; justify-content: space-between; align-items: center; background: #f3e5f5; padding: 12px; margin: 8px 0; border-radius: 8px; font-weight: bold; cursor: pointer;}
        .letter-display { font-size: 72px; text-align: center; font-weight: bold; color: #ffb300; margin: 10px 0; }
        .timer { font-size: 24px; text-align: center; font-weight: bold; color: #d32f2f; margin: 15px 0; background: #ffebee; padding: 10px; border-radius: 8px; }
        .letters-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .letter-btn { padding: 8px 0; font-size: 13px; background: #4caf50; color: white; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; text-align: center;}
        .letter-btn.disabled { background: #f44336; text-decoration: line-through; opacity: 0.6; }
        .theme-tag { display: flex; justify-content: space-between; align-items: center; background: #e0f7fa; padding: 8px 12px; margin: 5px 0; border-radius: 6px; border-left: 4px solid #00acc1; font-weight: bold; }
        .btn-remove-theme { background: none; color: #ff4336; width: auto; margin: 0; padding: 0 5px; font-size: 16px; }
        .review-box { background: #fff; border: 2px solid #ba68c8; border-radius: 8px; padding: 15px; margin-top: 10px; display: none; position: relative; }
        .btn-close-review { position: absolute; top: 10px; right: 10px; background: #ff4b2b; color: white; border: none; font-size: 14px; width: 30px; height: 30px; border-radius: 50%; padding: 0; cursor: pointer; line-height: 30px; text-align: center; }
        .row-config { display: flex; gap: 10px; }
        .row-config div { flex: 1; }
    </style>
</head>
<body>
<div class="container">
    <div id="status-conexao">🔴 Conectando ao servidor backend...</div>

    <div id="screen-login" class="screen active">
        <h2>Stop! Online</h2>
        <input type="text" id="username" placeholder="Seu Nome">
        <button class="btn-primary" onclick="createRoom()">Criar Nova Sala</button>
        <hr style="border: 0; height: 1px; background: #ddd; margin: 15px 0;">
        <input type="text" id="room-code-input" placeholder="Código da Sala">
        <button class="btn-success" onclick="joinRoom()">Entrar em Sala</button>
    </div>

    <div id="screen-lobby" class="screen">
        <h2 id="lobby-title">Sala: ----</h2>
        
        <div id="host-settings" style="display: none;">
            <h3>Configurações do Jogo</h3>
            <div style="display:flex; gap: 5px;">
                <input type="text" id="new-theme-name" placeholder="Adicionar Novo Tema" style="margin:0;">
                <button class="btn-primary" onclick="addTheme()" style="width:auto; margin:0; padding: 0 20px;">+</button>
            </div>
            
            <div class="row-config">
                <div>
                    <label>N° de Rodadas:</label>
                    <input type="number" id="setting-rounds" value="5" onchange="updateSettings()">
                </div>
                <div>
                    <label>Tempo (seg):</label>
                    <input type="number" id="setting-time" value="60" onchange="updateSettings()">
                </div>
            </div>

            <div class="row-config">
                <div>
                    <label>Pts Único:</label>
                    <input type="number" id="setting-pts-acerto" value="10" onchange="updateSettings()">
                </div>
                <div>
                    <label>Pts Repetido:</label>
                    <input type="number" id="setting-pts-repetido" value="5" onchange="updateSettings()">
                </div>
            </div>
            
            <label style="margin-top:10px;">Letras Permitidas:</label>
            <div class="letters-grid" id="alphabet-selector"></div>
        </div>

        <h3>Temas Ativos</h3>
        <div id="lobby-themes-list"></div>
        
        <h3>Jogadores</h3>
        <div id="player-list"></div>
        
        <button id="btn-start-game" class="btn-success" onclick="startRound()" style="display: none;">Começar Jogo</button>
    </div>

    <div id="screen-game" class="screen">
        <h2 id="game-status">Rodada 1</h2>
        <div id="stop-alert" style="display:none; text-align:center; background:#ff9800; color:white; font-weight:bold; padding:8px; border-radius:8px; margin-bottom:10px;"></div>
        <div class="letter-display" id="game-letter">-</div>
        <div class="timer" id="game-timer">Tempo: --s</div>
        <form id="game-form" onsubmit="triggerStop(event)">
            <div id="dynamic-inputs-container"></div>
            <button type="submit" id="btn-main-action" class="btn-stop">STOP!</button>
        </form>
    </div>

    <div id="screen-review" class="screen">
        <h2>Fim da Rodada!</h2>
        <p style="text-align:center; color:#666; font-size:14px;">Clique no nome de qualquer jogador para conferir o tempo e as palavras dele.</p>
        
        <h3>Placar Geral</h3>
        <div id="ranking-list"></div>

        <div id="review-details-box" class="review-box">
            <button class="btn-close-review" onclick="fecharDetalhesJogador()">X</button>
            <h4 id="review-player-name" style="margin:0 0 10px 0; color:#4a148c;">Folha de Respostas</h4>
            <p id="review-player-time" style="font-weight:bold; color:#d32f2f; margin:5px 0;"></p>
            <div id="review-player-answers"></div>
        </div>

        <button id="btn-next-round" class="btn-success" onclick="startRound()" style="display: none; margin-top:20px;">Próxima Rodada</button>
    </div>

    <div id="screen-final" class="screen">
        <h2>🏆 PODIUM FINAL 🏆</h2>
        <div id="podium-content"></div>
        <button class="btn-primary" onclick="window.location.reload()" style="margin-top:20px;">Jogar Novamente</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io("https://jogo-stop.onrender.com");
    let myId = null, timerInterval = null, activeCategories = [], isHost = false;
    let tempoTotalRodada = 60, milissegundosPassados = 0;
    let guardouPlayersReview = [];
    let euJaDeiStop = false;
    const alfabeto = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

    socket.on('connect', () => { 
        myId = socket.id; 
        document.getElementById('status-conexao').innerText = "🟢 Conectado ao Servidor!";
        document.getElementById('status-conexao').style.background = "#11998e";
    });

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function createRoom() {
        const name = document.getElementById('username').value.trim();
        if(!name) return alert('Digite seu nome!');
        socket.emit('criarSala', name);
    }

    function joinRoom() {
        const name = document.getElementById('username').value.trim();
        const roomCode = document.getElementById('room-code-input').value.trim();
        if(!name || !roomCode) return alert('Preencha nome e código!');
        socket.emit('joinRoom', { roomCode, name });
    }

    function addTheme() {
        const input = document.getElementById('new-theme-name');
        if(input.value.trim()) { 
            socket.emit('addCategory', input.value.trim()); 
            input.value = ''; 
        }
    }

    function removeTheme(tema) { socket.emit('removeCategory', tema); }
    function toggleLetter(letra) { if(isHost) socket.emit('toggleLetter', letra); }

    function updateSettings() {
        if(isHost) {
            socket.emit('updateSettings', {
                maxRounds: document.getElementById('setting-rounds').value,
                roundTime: document.getElementById('setting-time').value,
                ptsAcerto: document.getElementById('setting-pts-acerto').value,
                ptsRepetido: document.getElementById('setting-pts-repetido').value
            });
        }
    }

    function startRound() { socket.emit('startRound'); }

    function triggerStop(e) {
        e.preventDefault();
        euJaDeiStop = true;
        
        const answers = {};
        activeCategories.forEach(c => {
            const inputEl = document.getElementById('ans-' + c);
            answers[c] = inputEl.value;
            inputEl.disabled = true;
        });
        
        const tempoGastoFinal = (milissegundosPassados / 1000).toFixed(1) + "s";
        socket.emit('pressStop', { respostas: answers, tempoGasto: tempoGastoFinal });
        
        document.getElementById('btn-main-action').disabled = true;
        document.getElementById('btn-main-action').innerText = "VOCÊ DEU STOP!";
        document.getElementById('btn-main-action').style.background = "#777";
    }

    function enviarPorFimDeTempo() {
        const answers = {};
        activeCategories.forEach(c => {
            const inputEl = document.getElementById('ans-' + c);
            answers[c] = inputEl.value;
            inputEl.disabled = true;
        });
        const tempoGastoFinal = (tempoTotalRodada).toFixed(1) + "s";
        socket.emit('submitAnswers', { respostas: answers, tempoGasto: tempoGastoFinal });
    }

    socket.on('salaCriada', () => { showScreen('screen-lobby'); });

    socket.on('stopPressionado', (nome) => {
        const alerta = document.getElementById('stop-alert');
        alerta.innerText = `🚨 ${nome} deu STOP! Digite rápido até o tempo acabar!`;
        alerta.style.display = 'block';
    });

    socket.on('roomUpdated', (room) => {
        activeCategories = room.categories;
        isHost = room.host === myId;
        document.getElementById('lobby-title').innerText = 'Sala: ' + room.code;
        
        document.getElementById('host-settings').style.display = isHost ? 'block' : 'none';
        document.getElementById('btn-start-game').style.display = isHost ? 'block' : 'none';

        if(isHost) {
            const grid = document.getElementById('alphabet-selector');
            grid.innerHTML = '';
            alfabeto.forEach(l => {
                const ativa = room.allowedLetters.includes(l);
                grid.innerHTML += `<button class="letter-btn ${ativa ? '' : 'disabled'}" onclick="toggleLetter('${l}')">${l}</button>`;
            });
        }

        const themesList = document.getElementById('lobby-themes-list');
        themesList.innerHTML = '';
        room.categories.forEach(c => {
            themesList.innerHTML += `
                <div class="theme-tag">
                    <span>📝 ${c}</span>
                    ${isHost ? `<button class="btn-remove-theme" onclick="removeTheme('${c}')">❌</button>` : ''}
                </div>`;
        });

        const playerList = document.getElementById('player-list');
        playerList.innerHTML = '';
        room.players.forEach(p => {
            playerList.innerHTML += `<div class="player-item" style="cursor:default">${p.name} ${p.id === room.host ? '👑' : ''} ${p.submitted ? '✅' : '⏳'}</div>`;
        });
    });

    socket.on('roundStarted', (data) => {
        clearInterval(timerInterval);
        activeCategories = data.categories;
        tempoTotalRodada = data.roundTime;
        milissegundosPassados = 0;
        euJaDeiStop = false;

        document.getElementById('stop-alert').style.display = 'none';
        document.getElementById('btn-main-action').disabled = false;
        document.getElementById('btn-main-action').innerText = "STOP!";
        document.getElementById('btn-main-action').style.background = "linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%)";

        document.getElementById('game-status').innerText = 'Rodada ' + data.round + '/' + data.maxRounds;
        document.getElementById('game-letter').innerText = data.letter;
        
        const container = document.getElementById('dynamic-inputs-container');
        container.innerHTML = '';
        activeCategories.forEach(c => {
            container.innerHTML += `<label>✏️ ${c}:</label><input type="text" id="ans-${c}">`;
        });

        document.getElementById('game-timer').innerText = 'Tempo: ' + tempoTotalRodada + 's';
        
        timerInterval = setInterval(() => {
            milissegundosPassados += 1000;
            let tempoRestante = tempoTotalRodada - (milissegundosPassados / 1000);
            document.getElementById('game-timer').innerText = 'Tempo: ' + Math.max(0, Math.ceil(tempoRestante)) + 's';
            
            if(tempoRestante <= 0) {
                clearInterval(timerInterval);
                if (!euJaDeiStop) {
                    enviarPorFimDeTempo();
                }
            }
        }, 1000);
        showScreen('screen-game');
    });

    socket.on('showReviewTable', ({ hostId, players, ranking, categories, isLastRound }) => {
        clearInterval(timerInterval);
        guardouPlayersReview = players;
        
        // Garante que a checagem de privilégio persista ao mudar de tela
        isHost = hostId === myId;
        
        document.getElementById('review-details-box').style.display = 'none';
        
        const rList = document.getElementById('ranking-list');
        rList.innerHTML = '';
        ranking.forEach((p, idx) => {
            rList.innerHTML += `
                <div class="player-item" onclick="mostrarDetalhesJogador('${p.id}')">
                    <b>${idx+1}° ${p.name}</b> 
                    <span>🔍 Ver Folha | ${p.points} pts</span>
                </div>`;
        });

        if(isLastRound) {
            document.getElementById('btn-next-round').style.display = 'none';
            const podium = document.getElementById('podium-content');
            podium.innerHTML = '';
            
            ranking.slice(0, 3).forEach((p, i) => {
                let medalha = i === 0 ? '🥇' : (i === 1 ? '🥈' : '🥉');
                podium.innerHTML += `
                    <div class="player-item" style="background:#ffca28; cursor:default; font-size:18px; padding:15px;">
                        <span>${medalha} ${i+1}° Lugar: <b>${p.name}</b></span>
                        <b>${p.points} pts</b>
                    </div>`;
            });
            showScreen('screen-final');
        } else {
            // Exibe o botão de Próxima Rodada apenas para quem for de fato o Host dono da sala
            document.getElementById('btn-next-round').style.display = isHost ? 'block' : 'none';
            showScreen('screen-review');
        }
    });

    function mostrarDetalhesJogador(idJogador) {
        const player = guardouPlayersReview.find(p => p.id === idJogador);
        if(!player) return;

        document.getElementById('review-player-name').innerText = `Folha de: ${player.name}`;
        document.getElementById('review-player-time').innerText = `⏱️ Tempo de envio: ${player.timeTaken || "Não finalizou"}`;
        
        const containerAns = document.getElementById('review-player-answers');
        containerAns.innerHTML = '';
        
        activeCategories.forEach(cat => {
            const respostaDada = player.answers[cat] || '---';
            containerAns.innerHTML += `<p style="margin:6px 0; font-size:15px;"><b>${cat}:</b> <span style="color:#2575fc">${respostaDada}</span></p>`;
        });

        document.getElementById('review-details-box').style.display = 'block';
    }

    // NOVA FUNÇÃO DO BOTÃO "X" SOLICITADO
    function fecharDetalhesJogador() {
        document.getElementById('review-details-box').style.display = 'none';
    }

    socket.on('erro', (msg) => alert(msg));
</script>
</body>
</html>
