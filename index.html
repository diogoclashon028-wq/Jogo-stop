<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop! Online Supremo</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #1c163a 100%); 
            color: #f3f1f8; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        .container { 
            background: rgba(30, 25, 54, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1); 
            width: 100%; 
            max-width: 480px; 
            text-align: center; 
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Indicador de Status Premium */
        .status-servidor {
            position: absolute; top: 18px; right: 20px;
            display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 700;
            background: rgba(255, 255, 255, 0.06); padding: 6px 14px; border-radius: 30px;
            letter-spacing: 0.5px; border: 1px solid rgba(255,255,255,0.05);
        }
        .bolinha { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .bolinha.conectado { background: #10b981; box-shadow: 0 0 12px #10b981; }

        h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #a78bfa 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }
        h2 { font-size: 1.4rem; font-weight: 700; color: #f3f1f8; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .room-tag {
            background: rgba(167, 139, 250, 0.15);
            color: #c084fc;
            padding: 4px 12px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.5rem;
            border: 1px dashed rgba(192, 132, 252, 0.4);
            display: inline-block;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        /* Inputs Modernos */
        input[type="text"] { 
            width: 100%; 
            padding: 14px 18px; 
            margin: 10px 0; 
            border: 2px solid rgba(255, 255, 255, 0.08); 
            border-radius: 14px; 
            background: rgba(15, 12, 32, 0.5);
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.2);
            background: rgba(15, 12, 32, 0.8);
        }

        /* Botões Estilizados */
        button { 
            width: 100%; 
            padding: 15px; 
            margin: 12px 0; 
            border: none; 
            border-radius: 14px; 
            font-size: 1rem; 
            font-weight: 700; 
            color: white; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        button:active { transform: scale(0.98); }
        
        .btn-primary { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); }
        .btn-primary:hover { box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); }
        
        .btn-secondary { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
        .btn-secondary:hover { box-shadow: 0 0 20px rgba(5, 150, 105, 0.4); }

        .divider { margin: 20px 0; color: rgba(255,255,255,0.2); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        .escondido { display: none !important; }

        /* Lista de Jogadores Profissional */
        ul { list-style: none; margin: 20px 0; text-align: left; max-height: 240px; overflow-y: auto; padding-right: 5px; }
        ul::-webkit-scrollbar { width: 6px; }
        ul::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        li { 
            background: rgba(255, 255, 255, 0.04); 
            padding: 14px 18px; 
            border-radius: 12px; 
            margin-bottom: 8px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.02);
            animation: fadeIn 0.4s ease forwards;
        }
        li:hover { background: rgba(255, 255, 255, 0.07); transform: translateX(2px); }

        .player-info { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .player-status { font-size: 0.8rem; background: rgba(167, 139, 250, 0.2); color: #c084fc; padding: 2px 8px; border-radius: 20px; font-weight: bold; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-servidor">
            <div class="bolinha" id="statusBolinha"></div>
            <span id="statusTexto">CONECTANDO</span>
        </div>

        <div id="telaInicial">
            <h1>Stop! Arena 🎲</h1>
            <input type="text" id="nome" placeholder="Digite seu apelido...">
            <button id="btnCriar" class="btn-primary">CRIAR NOVA SALA</button>
            
            <div class="divider">ou entre em uma</div>
            
            <input type="text" id="codigo" placeholder="Código de 4 dígitos">
            <button id="btnEntrar" class="btn-secondary">ENTRAR NA SALA</button>
        </div>

        <div id="telaLobby" class="escondido">
            <h2>Sala Ativa</h2>
            <div id="idSala" class="room-tag">----</div>
            
            <div style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px;">
                <h3 style="text-align: left; font-size: 1rem; color: rgba(255,255,255,0.5); font-weight: 600; margin-bottom: 10px;">JOGADORES NA ARENA</h3>
                <ul id="listaJogadores"></ul>
            </div>

            <button id="btnIniciarFake" class="btn-primary" style="opacity: 0.6; cursor: not-allowed; margin-top: 15px;">AGUARDANDO O DONO...</button>
        </div>
    </div>

    <script>
        const socket = io({
            transports: ['polling', 'websocket']
        });
        
        let minhaSala = '';

        socket.on('connect', () => { 
            document.getElementById('statusBolinha').classList.add('conectado');
            document.getElementById('statusTexto').innerText = "ONLINE";
        });

        socket.on('disconnect', () => {
            document.getElementById('statusBolinha').classList.remove('conectado');
            document.getElementById('statusTexto').innerText = "DESCONECTADO";
        });

        document.getElementById('btnCriar').addEventListener('click', () => {
            const nome = document.getElementById('nome').value.trim();
            if(nome) socket.emit('criarSala', nome);
        });

        document.getElementById('btnEntrar').addEventListener('click', () => {
            const nome = document.getElementById('nome').value.trim();
            const cod = document.getElementById('codigo').value.trim().toUpperCase();
            if(nome && cod) {
                minhaSala = cod;
                socket.emit('joinRoom', { roomCode: minhaSala, name: nome });
            }
        });

        socket.on('salaCriada', (codigo) => { minhaSala = codigo; });

        socket.on('atualizarSala', (sala) => {
            document.getElementById('telaInicial').classList.add('escondido');
            document.getElementById('telaLobby').classList.remove('escondido');
            document.getElementById('idSala').innerText = sala.codigo;

            const lista = document.getElementById('listaJogadores');
            lista.innerHTML = '';
            sala.jogadores.forEach(p => {
                const coroa = p.id === sala.donoId ? '👑' : '👤';
                lista.innerHTML += `
                    <li>
                        <div class="player-info">
                            <span>${coroa}</span>
                            <span>${p.nome}</span>
                        </div>
                        <span class="player-status">Pronto</span>
                    </li>
                `;
            });
        });

        socket.on('erro', (msg) => alert(msg));
    </script>
</body>
</html>
