<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop! Base de Reserva</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
            position: relative;
        }
        .status-servidor {
            position: absolute; top: 15px; right: 15px;
            display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: bold;
        }
        .bolinha { width: 10px; height: 10px; border-radius: 5px; background: #ff3333; }
        .bolinha.conectado { background: #00bfa5; }
        input[type="text"] { width: 100%; padding: 10px; margin: 8px 0; border: 2px solid #e0e0e0; border-radius: 10px; }
        button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 10px; font-weight: bold; color: white; cursor: pointer; background: #764ba2; }
        .escondido { display: none; }
        ul { list-style: none; margin: 10px 0; text-align: left; }
        li { background: #f7f7f9; padding: 10px; border-radius: 8px; margin-bottom: 6px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-servidor">
            <div class="bolinha" id="statusBolinha"></div>
            <span id="statusTexto">Desconectado</span>
        </div>

        <div id="telaInicial">
            <h1>Stop! Inicial 🎲</h1>
            <input type="text" id="nome" placeholder="Seu Nome">
            <button id="btnCriar">CRIAR SALA</button>
            <input type="text" id="codigo" placeholder="CÓDIGO DA SALA">
            <button id="btnEntrar" style="background: #00bfa5;">ENTRAR NA SALA</button>
        </div>

        <div id="telaLobby" class="escondido">
            <h1>Sala: <span id="idSala" style="color:#00bfa5;">----</span></h1>
            <h3>Jogadores:</h3>
            <ul id="listaJogadores"></ul>
        </div>
    </div>

    <script>
        const socket = io({
            transports: ['polling', 'websocket']
        });
        
        let minhaSala = '';

        socket.on('connect', () => { 
            document.getElementById('statusBolinha').classList.add('conectado');
            document.getElementById('statusTexto').innerText = "Conectado";
        });

        socket.on('disconnect', () => {
            document.getElementById('statusBolinha').classList.remove('conectado');
            document.getElementById('statusTexto').innerText = "Desconectado";
        });

        document.getElementById('btnCriar').addEventListener('click', () => {
            const nome = document.getElementById('nome').value.trim();
            if(nome) socket.emit('criarSala', nome);
        });

        document.getElementById('btnEntrar').addEventListener('click', () => {
            const nome = document.getElementById('nome').value.trim();
            const cod = document.getElementById('codigo').value.trim().toUpperCase();
            if(nome && cod) {
                minhaSala = cod;
                socket.emit('joinRoom', { roomCode: minhaSala, name: nome });
            }
        });

        socket.on('salaCriada', (codigo) => { minhaSala = codigo; });

        socket.on('atualizarSala', (sala) => {
            document.getElementById('telaInicial').classList.add('escondido');
            document.getElementById('telaLobby').classList.remove('escondido');
            document.getElementById('idSala').innerText = sala.codigo;

            const lista = document.getElementById('listaJogadores');
            lista.innerHTML = '';
            sala.jogadores.forEach(p => {
                lista.innerHTML += `<li>👤 ${p.nome}</li>`;
            });
        });

        socket.on('erro', (msg) => alert(msg));
    </script>
</body>
</html>
