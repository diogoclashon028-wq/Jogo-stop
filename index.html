<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop! Online</title>
    
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            color: #5e35b1;
            margin-bottom: 25px;
            font-size: 2.5rem;
        }

        .status-bar {
            background-color: #ff4d4d;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background-color 0.5s ease;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #764ba2;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            margin-top: 5px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-create {
            background: linear-gradient(135deg, #6a1b9a 0%, #8e24aa 100%);
            margin-bottom: 15px;
        }

        .btn-join {
            background: linear-gradient(135deg, #00bfa5 0%, #00bc8c 100%);
        }

        button:hover {
            filter: brightness(1.1);
        }

        .divisor {
            margin: 15px 0;
            color: #999;
            font-weight: bold;
            position: relative;
        }

        .divisor::before, .divisor::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background-color: #ddd;
        }

        .divisor::before { left: 0; }
        .divisor::after { right: 0; }
    </style>
</head>
<body>

    <div class="container">
        <div id="statusBar" class="status-bar">
            <span class="status-dot"></span>
            <span id="statusText">Conectando ao servidor...</span>
        </div>

        <h1>Stop! Online</h1>

        <input type="text" id="nomeJogador" placeholder="Seu Nome" maxlength="15">

        <button id="btnCriar" class="btn-create">CRIAR NOVA SALA</button>

        <div class="divisor">-- OU --</div>

        <input type="text" id="codigoSala" placeholder="CÓDIGO DA SALA" maxlength="4" style="text-transform: uppercase;">
        <button id="btnEntrar" class="btn-join">ENTRAR EM SALA</button>
    </div>

    <script>
        const socket = io();

        const statusBar = document.getElementById('statusBar');
        const statusText = document.getElementById('statusText');
        const btnCriar = document.getElementById('btnCriar');
        const btnEntrar = document.getElementById('btnEntrar');
        const nomeJogador = document.getElementById('nomeJogador');
        const codigoSala = document.getElementById('codigoSala');

        socket.on('connect', () => {
            statusBar.style.backgroundColor = '#2ecc71';
            statusText.innerText = 'Conectado ao Servidor';
        });

        socket.on('disconnect', () => {
            statusBar.style.backgroundColor = '#ff4d4d';
            statusText.innerText = 'Conectando ao servidor...';
        });

        btnCriar.addEventListener('click', () => {
            const nome = nomeJogador.value.trim();
            if (!nome) {
                alert('Por favor, digite o seu nome para jogar!');
                return;
            }
            socket.emit('criarSala', nome);
        });

        btnEntrar.addEventListener('click', () => {
            const nome = nomeJogador.value.trim();
            const codigo = codigoSala.value.trim().toUpperCase();

            if (!nome) {
                alert('Por favor, digite o seu nome para jogar!');
                return;
            }
            if (codigo.length !== 4) {
                alert('O código da sala deve conter exatamente 4 letras!');
                return;
            }

            socket.emit('joinRoom', { roomCode: codigo, name: nome });
        });

        // Redireciona usando a rota limpa '/lobby' aceita pelo Express
        socket.on('salaCriado', (codigoGerado) => {
            window.location.href = `/lobby?room=${codigoGerado}`;
        });

        socket.on('erro', (mensagem) => {
            alert(mensagem);
        });
    </script>

</body>
</html>
